# Routes that share a path between the SPA and the API need special handling.
# API calls carry either the normal JWT Authorization header or the backend-only
# X-Service-Token header; direct browser page loads carry neither. Use this to
# distinguish the shared SPA/API paths.
map $http_authorization $has_authorization {
    ~^Bearer\s  1;
    default     0;
}

map $http_x_service_token $has_service_token {
    ~.+         1;
    default     0;
}

map "$has_authorization$has_service_token" $is_api_request {
    ~1          1;
    default     0;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS (for container name resolution on custom networks)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Backend proxy ──────────────────────────────────────────────────────────
    # All API routes are proxied to the beastvault-api container.
    # Using a variable forces nginx to resolve at request-time (not startup),
    # so it won't crash if the backend isn't reachable yet.
    # The docker-entrypoint.sh replaces "beastvault-api:8080" with API_BACKEND
    # env var value if set (e.g. 192.168.0.32:8081 for bridge network).
    # /dex sub-paths are shared: direct browser loads are SPA routes,
    # authenticated fetches are API calls.
    location ~ ^/dex/ {
        if ($is_api_request = "0") {
            rewrite ^ /index.html last;
        }
        set $api_backend http://beastvault-api:8080;
        proxy_pass         $api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # /pokemon/{id} and /pokemon/{id}/... are shared between React Router and the API.
    location ~ ^/pokemon/[0-9]+$ {
        if ($is_api_request = "0") {
            rewrite ^ /index.html last;
        }
        set $api_backend http://beastvault-api:8080;
        proxy_pass         $api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # /dex exactly — serve SPA on direct browser loads; proxy authenticated API calls.
    location = /dex {
        if ($is_api_request = "0") {
            rewrite ^ /index.html last;
        }
        set $api_backend http://beastvault-api:8080;
        proxy_pass         $api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    location ~ ^/(auth|pokemon|pokedex|tags|boxes|files|export|import|scan|maintenance|custom-sprites|sprites|items|config|health|swagger|openapi)(/|$) {
        set $api_backend http://beastvault-api:8080;
        proxy_pass         $api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # Assets - serve from root always
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # config.js - never cache (runtime API URL injection)
    location = /config.js {
        alias /usr/share/nginx/html/config.js;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html
    location ~* index\.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}
